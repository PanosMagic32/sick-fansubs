services:
  # ========================================
  # NestJS API Service
  # ========================================
  api:
    container_name: sick-api
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
      args:
        NODE_VERSION: lts-alpine
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3333
    ports:
      - '${API_PORT:-3333}:3333'
    restart: unless-stopped
    networks:
      - sick-nw
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ========================================
  # MinIO Object Storage
  # ========================================
  minio:
    image: minio/minio:latest
    container_name: sick-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - sick-nw
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ========================================
  # Nginx + Angular Web Service
  # ========================================
  web:
    container_name: sick-web
    build:
      context: .
      dockerfile: Dockerfile.web
      target: web
      args:
        NGINX_VERSION: 1.27-alpine
    env_file:
      - .env
    ports:
      - '${WEB_HTTP_PORT:-80}:8080'
      - '${WEB_HTTPS_PORT:-443}:8443'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sick-nw
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

# ========================================
# Volumes
# ========================================
volumes:
  minio_data:
    driver: local

# ========================================
# Networks
# ========================================
networks:
  sick-nw:
    driver: bridge
    name: sick-network
