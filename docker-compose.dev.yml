
# Development docker-compose configuration
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # ========================================
  # NestJS API Service (Development)
  # ========================================
  api:
    container_name: sick-api-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        NODE_VERSION: 24-alpine
        API_BUILD_TARGET: api:build
        WEB_BUILD_TARGET: web:build:development
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3333
    ports:
      - "3333:3333"
      - "9229:9229"  # Node.js debugger port
    volumes:
      # Mount source code for hot-reload
      - ./apps/api:/app/apps/api:ro
      - ./libs:/app/libs:ro
      - /app/node_modules  # Prevent overwriting node_modules
    restart: unless-stopped
    networks:
      - sick-nw-dev
    command: ["node", "--inspect=0.0.0.0:9229", "dist/main.js"]

  # ========================================
  # MinIO Object Storage (Development)
  # ========================================
  minio:
    image: minio/minio:latest
    container_name: sick-minio-dev
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    restart: unless-stopped
    networks:
      - sick-nw-dev

  # ========================================
  # Nginx + Angular Web Service (Development)
  # ========================================
  web:
    container_name: sick-web-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NGINX_VERSION: 1.27-alpine
        API_BUILD_TARGET: api:build
        WEB_BUILD_TARGET: web:build:development
    env_file:
      - .env
    ports:
      - "4200:8080"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - sick-nw-dev

volumes:
  minio_data_dev:
    driver: local

networks:
  sick-nw-dev:
    driver: bridge
    name: sick-network-dev
