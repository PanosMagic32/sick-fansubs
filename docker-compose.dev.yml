
# Development docker-compose configuration
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # ========================================
  # NestJS API Service (Development)
  # ========================================
  api:
    container_name: sick-api-dev
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api-dev
      args:
        NODE_VERSION: 24-alpine
    env_file:
      - .env
    entrypoint: []
    environment:
      NODE_ENV: development
      PORT: 3333
      MINIO_PUBLIC_BASE_URL: http://localhost:4200
    ports:
      - "3333:3333"
      - "9229:9229"  # Node.js debugger port
    volumes:
      # Mount source code for Nx watch mode.
      - ./apps/api:/app/apps/api
      - ./libs:/app/libs
      - ./nx.json:/app/nx.json:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
    restart: unless-stopped
    depends_on:
      - minio
    networks:
      - sick-nw-dev
    command: ["pnpm", "exec", "nx", "run", "api:serve", "--", "--host=0.0.0.0", "--inspect=true", "--port=9229"]

  # ========================================
  # MinIO Object Storage (Development)
  # ========================================
  minio:
    image: minio/minio:latest
    container_name: sick-minio-dev
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    restart: unless-stopped
    networks:
      - sick-nw-dev

  # ========================================
  # Angular Web Service (Development)
  # ========================================
  web:
    container_name: sick-web-dev
    build:
      context: .
      dockerfile: Dockerfile.web
      target: web-dev
      args:
        NODE_VERSION: 24-alpine
    env_file:
      - .env
    entrypoint: []
    environment:
      NODE_ENV: development
    ports:
      - "4200:4200"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./libs:/app/libs
      - ./nx.json:/app/nx.json:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
    restart: unless-stopped
    networks:
      - sick-nw-dev
    command: ["pnpm", "exec", "nx", "run", "web:serve", "--", "--host=0.0.0.0", "--port=4200", "--proxyConfig=apps/web/proxy.docker.conf.json"]

volumes:
  minio_data_dev:
    driver: local

networks:
  sick-nw-dev:
    driver: bridge
    name: sick-network-dev
