<div class="grid-container">
  <h1 class="mat-h1">Επισκόπηση</h1>

  @if (usersResource.isLoading()) {
    <p class="dashboard-state">Φόρτωση στατιστικών...</p>
  } @else if (usersResource.error()) {
    <p class="dashboard-state error">Αδυναμία φόρτωσης στατιστικών dashboard.</p>
  } @else {
    <mat-grid-list [cols]="isHandset() ? 1 : 2" rowHeight="230px">
      @for (card of cards(); track card.title) {
        <mat-grid-tile [colspan]="card.cols" [rowspan]="card.rows">
          <mat-card class="dashboard-card">
            <mat-card-header>
              <mat-card-title>
                {{ card.title }}
              </mat-card-title>
              <mat-card-subtitle>{{ card.subtitle }}</mat-card-subtitle>
            </mat-card-header>

            <mat-card-content class="dashboard-card-content">
              <div>{{ card.value }}</div>
            </mat-card-content>
          </mat-card>
        </mat-grid-tile>
      }
    </mat-grid-list>
  }
</div>
