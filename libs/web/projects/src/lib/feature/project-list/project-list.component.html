@if (projects.isLoading()) {
  <mat-progress-bar mode="indeterminate" />
}

<div class="create-post-btn">
  @if (canManageContent()) {
    <button mat-fab extended color="primary" (click)="onCreateProject()">
      <mat-icon>add</mat-icon>
      Προσθήκη νέου project
    </button>
  }
</div>

<div class="projects-container">
  @if (projects.value() && totalProjects() > 0 && !projects.isLoading()) {
    @for (project of projects.value()!.projects; track project._id) {
      <sf-project-item [project]="project" [index]="$index" [canManageContent]="canManageContent()" />
    }
  } @else {
    @if (!projects.isLoading()) {
      <sf-no-content />
    }
  }
</div>

@if (projects.value() && totalProjects() > 0) {
  <div class="paginator-container">
    <mat-paginator
      [pageIndex]="currentPage() - 1"
      [length]="projects.value()!.count"
      [pageSize]="pageSize()"
      [pageSizeOptions]="pageSizeOptions()"
      (page)="onPageChange($event)"
      aria-label="Select page of projects"
    />
  </div>
}
