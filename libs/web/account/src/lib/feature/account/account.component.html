<div class="account-container">
  @switch (accountViewState()) {
    @case ('loading') {
      <sf-status-card state="loading" message="Φόρτωση προφίλ..." />
    }

    @case ('error') {
      <sf-status-card
        state="error"
        [message]="profileErrorMessage"
        [showRetry]="true"
        [showSecondaryAction]="true"
        secondaryActionLabel="Αποσύνδεση"
        secondaryActionIcon="logout"
        secondaryActionColor="warn"
        (retry)="onRetryLoadProfile()"
        (secondaryAction)="onLogout()"
      />
    }

    @case ('ready') {
      <div class="account-ready-layout">
        <div class="account-primary-column">
          <mat-card class="account-card main-account-card">
            <mat-card-header>
              <mat-card-title>
                <mat-icon>person</mat-icon>
                Λογαριασμός
              </mat-card-title>
            </mat-card-header>

            <mat-divider />

            <mat-card-content>
              <sf-account-profile-summary
                [profile]="displayProfile()!"
                [safeAvatarUrl]="safeAvatarUrl()"
                [canAccessDashboard]="canAccessDashboard()"
                (avatarImageError)="onAvatarImageError()"
                (openDashboard)="onOpenDashboard()"
              />

              <sf-account-profile-form
                [profileForm]="profileForm"
                [isUploadingAvatar]="isAvatarUploadInProgress()"
                [isNewPasswordVisible]="isNewPasswordVisible()"
                [isConfirmPasswordVisible]="isConfirmPasswordVisible()"
                [passwordRequirementsHint]="passwordRequirementsHint"
                [passwordStrengthLabel]="passwordStrengthLabel"
                [shouldShowPasswordMismatch]="shouldShowPasswordMismatch"
                [isSaving]="updateUserResource.isLoading()"
                (toggleNewPasswordVisibility)="toggleNewPasswordVisibility()"
                (toggleConfirmPasswordVisibility)="toggleConfirmPasswordVisibility()"
                (avatarFileSelected)="onAvatarFileSelected($event)"
                (saveChanges)="onSaveChanges()"
                (resetForm)="onResetForm()"
                (logout)="onLogout()"
                (deleteAccount)="onDeleteAccount()"
              />
            </mat-card-content>
          </mat-card>
        </div>

        <div class="account-secondary-column">
          <mat-tab-group class="favorites-tabs" animationDuration="200ms" mat-stretch-tabs="false">
            <mat-tab label="Αναρτήσεις">
              <sf-account-favorites
                [favoriteBlogPostIds]="favoriteBlogPostIds()"
                [favoriteBlogPosts]="favoriteBlogPosts()"
                [favoritePostsTotal]="favoriteBlogPostsTotal()"
                [currentPage]="favoritePostsPage()"
                [pageSize]="favoritePostsPageSizeValue()"
                [pageSizeOptions]="favoritePostsPageSizeOptions()"
                [isFavoriteIdsLoading]="favoriteBlogPostIdsResource.isLoading()"
                [hasFavoriteIdsError]="!!favoriteBlogPostIdsResource.error()"
                [isFavoritePostsLoading]="favoriteBlogPostsResource.isLoading()"
                [hasFavoritePostsError]="!!favoriteBlogPostsResource.error()"
                [isRemovingFavorite]="removeFavoriteResource.isLoading()"
                [sortOrder]="favoriteSortOrderValue()"
                (retryLoadFavoriteIds)="onRetryLoadFavoriteIds()"
                (retryLoadFavoritePosts)="onRetryLoadFavoritePosts()"
                (removeFavorite)="onRemoveFavorite($event)"
                (download)="onDownload($event)"
                (pageChange)="onFavoritePostsPageChange($event)"
                (toggleSort)="toggleFavoriteSortOrder()"
              />
            </mat-tab>

            <mat-tab label="Projects">
              <sf-account-favorite-projects
                [favoriteProjectIds]="favoriteProjectIds()"
                [favoriteProjects]="favoriteProjects()"
                [favoriteProjectsTotal]="favoriteProjectsTotal()"
                [currentPage]="favoriteProjectsPage()"
                [pageSize]="favoriteProjectsPageSizeValue()"
                [pageSizeOptions]="favoriteProjectsPageSizeOptions()"
                [isFavoriteIdsLoading]="favoriteProjectIdsResource.isLoading()"
                [hasFavoriteIdsError]="!!favoriteProjectIdsResource.error()"
                [isFavoriteProjectsLoading]="favoriteProjectsResource.isLoading()"
                [hasFavoriteProjectsError]="!!favoriteProjectsResource.error()"
                [isRemovingFavorite]="removeFavoriteProjectResource.isLoading()"
                [sortOrder]="favoriteProjectsSortOrderValue()"
                (retryLoadFavoriteIds)="onRetryLoadFavoriteProjectIds()"
                (retryLoadFavoriteProjects)="onRetryLoadFavoriteProjects()"
                (removeFavorite)="onRemoveFavoriteProject($event)"
                (openProject)="onOpenFavoriteProject($event)"
                (pageChange)="onFavoriteProjectsPageChange($event)"
                (toggleSort)="toggleFavoriteProjectsSortOrder()"
              />
            </mat-tab>
          </mat-tab-group>
        </div>
      </div>
    }
  }
</div>
