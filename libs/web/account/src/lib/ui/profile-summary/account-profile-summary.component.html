<div class="profile-section">
  <h3>
    <mat-icon>person</mat-icon>
    Προφίλ
  </h3>

  <div class="profile-info">
    <div class="avatar-section">
      @if (safeAvatarUrl()) {
        <img [src]="safeAvatarUrl()" alt="avatar" class="avatar" (error)="onAvatarImageError()" />
      } @else {
        <mat-icon class="avatar-placeholder">account_circle</mat-icon>
      }
    </div>

    <div class="user-info">
      <h4>{{ profile().username }}</h4>
      <p class="user-email">{{ profile().email }}</p>

      <span class="admin-badge">
        <mat-icon>shield</mat-icon>
        Ρόλος: {{ roleLabel }}
      </span>
    </div>
  </div>

  @if (canAccessDashboard()) {
    <div class="dashboard-action">
      <p class="dashboard-action__hint">Πρόσβαση σε εργαλεία διαχείρισης</p>
      <button mat-flat-button type="button" class="dashboard-cta" (click)="onOpenDashboard()">
        <mat-icon>dashboard</mat-icon>
        Άνοιγμα Πίνακα Διαχείρισης
      </button>
    </div>
  }
</div>
